services:
  life-progress:
    build: .
    container_name: life-progress
    restart: unless-stopped
    ports:
      - "5051:5051"
    environment:
      - TZ=Asia/Manila
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
